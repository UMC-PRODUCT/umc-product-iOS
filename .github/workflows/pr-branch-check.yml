name: PR Branch Check

on:
  pull_request:
    branches: [develop]

jobs:
  check-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          SOURCE="${{ github.head_ref }}"
          # tuist/ 브랜치에서 develop으로 PR 차단
          if [[ "$SOURCE" == tuist/* ]]; then
            echo "❌ tuist/ 브랜치에서 develop으로 직접 PR을 생성할 수 없습니다."
            exit 1
          fi
          echo "✅ Branch check passed: $SOURCE"
